{% extends 'base.html' %}
{% block title %}Registrar Paciente — NutriGuajira{% endblock %}
{% block nav_pacientes %}active{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-person-plus text-success"></i> Registrar nuevo paciente</h4>
    <a href="/pacientes/" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

<div class="card">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}

            <h6 class="text-success mb-3"><i class="bi bi-person"></i> Datos del paciente</h6>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" name="nombre_completo" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Fecha de nacimiento</label>
                    <input type="date" name="fecha_nacimiento" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Institución</label>
                    <input type="text" name="institucion" class="form-control" placeholder="Colegio o fundación">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Peso (kg)</label>
                    <input type="number" name="peso_kg" step="0.01" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Talla (cm)</label>
                    <input type="number" name="talla_cm" step="0.01" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Nivel socioeconómico</label>
                    <select name="nivel_socioeconomico" class="form-select">
                        <option value="bajo">Bajo</option>
                        <option value="medio">Medio</option>
                        <option value="alto">Alto</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Nivel de actividad física</label>
                    <select name="nivel_actividad" class="form-select">
                        <option value="baja">Baja</option>
                        <option value="moderada">Moderada</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Alergias conocidas</label>
                    <input type="text" name="alergias" class="form-control" placeholder="Ej: maní, leche (separadas por coma)">
                </div>
            </div>

            <h6 class="text-success mb-3"><i class="bi bi-person-lines-fill"></i> Representante legal</h6>
            <div class="row g-3 mb-4">
                <div class="col-md-5">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" name="rep_nombre" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="rep_telefono" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Parentesco</label>
                    <select name="rep_parentesco" class="form-select">
                        <option value="madre">Madre</option>
                        <option value="padre">Padre</option>
                        <option value="abuelo">Abuelo/a</option>
                        <option value="tio">Tío/a</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
            </div>

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-check-circle"></i> Guardar paciente
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
